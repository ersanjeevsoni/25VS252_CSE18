<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <div class="container bg-info">

        <!--first row-->
        <div class="row bg-danger">
            <div class="col-md-12">
                <h1 class="text-center text-white">Bootstrap 5.3.8 Demo</h1>
            </div>
        </div>

        <!--second row-->
        <div class="row">
            <div class="col-lg-6 bg-warning">
                <h2>Left Column</h2>
            </div>
            <div class="col-lg-6 bg-light">
                <h2>Right Column</h2>
            </div>
        </div>

        <!--third row-->
        <div class="row">
            <div class="col-lg-4 bg-secondary">
                <h2>Box 1</h2>
            </div>
            <div class="col-lg-4 bg-dark text-white">
                <h2>Box 2</h2>
            </div>
            <div class="col-lg-4 bg-primary text-white">
                <h2>Box 3</h2>
            </div>
        </div>
    </div>

</html>
